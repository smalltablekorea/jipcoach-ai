name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Deploy to Vercel (Production)
        run: npx vercel --prod --yes --token=${ secrets.VERCEL_TOKEN }
        env:
          VERCEL_ORG_ID: ${ secrets.VERCEL_ORG_ID }
          VERCEL_PROJECT_ID: ${ secrets.VERCEL_PROJECT_ID }

      - name: Notify Telegram on Success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${ secrets.TELEGRAM_BOT_TOKEN }/sendMessage" \
            -d chat_id="${ secrets.TELEGRAM_CHAT_ID }" \
            -d parse_mode="HTML" \
            -d text="✅ <b>집코치AI</b> 배포 완료%0A%0ACommit: ${ github.event.head_commit.message }%0ABranch: main%0ABy: ${ github.actor }"

      - name: Notify Telegram on Failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${ secrets.TELEGRAM_BOT_TOKEN }/sendMessage" \
            -d chat_id="${ secrets.TELEGRAM_CHAT_ID }" \
            -d parse_mode="HTML" \
            -d text="🚨 <b>집코치AI</b> 배포 실패!%0A%0ACommit: ${ github.event.head_commit.message }%0ABranch: main%0ABy: ${ github.actor }%0A%0A<a href=\"${ github.server_url }/${ github.repository }/actions/runs/${ github.run_id }\">로그 보기</a>"